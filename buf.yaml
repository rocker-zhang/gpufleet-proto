version: v2
modules:
  - path: schema
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
  enum_zero_value_suffix: _UNSPECIFIED
  service_suffix: Service
breaking:
  use:
    - FILE
  except:
    - EXTENSION_NO_DELETE
    # The GateSignature / FaultClass enums keep a forward pool of reserved
    # numbers (e.g. `reserved 10 to 63`) that new deterministic signatures draw
    # from as they are added. Assigning a self-reserved number is wire-safe — it
    # never carried a prior meaning — so allow the reserved range to shrink.
    - RESERVED_ENUM_NO_DELETE
